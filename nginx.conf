# Nginx Configuration for CV Analyzer Service
# Use this if your hosting provider uses Nginx instead of Apache

upstream cv_analyzer {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    listen [::]:80;
    
    server_name cv-analyzer.yourdomain.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name cv-analyzer.yourdomain.com;
    
    # SSL Certificates (configured by cPanel AutoSSL or manually)
    ssl_certificate /home/username/ssl/cv-analyzer.yourdomain.com/certificate.crt;
    ssl_certificate_key /home/username/ssl/cv-analyzer.yourdomain.com/private.key;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Logging
    access_log /home/username/public_html/cv-analyzer-service/logs/nginx_access.log;
    error_log /home/username/public_html/cv-analyzer-service/logs/nginx_error.log;
    
    # Root directory
    root /home/username/public_html/cv-analyzer-service/public;
    
    # CORS Headers for Laravel Integration
    add_header Access-Control-Allow-Origin "https://yourdomain.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    
    # Handle OPTIONS requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }
    
    # Proxy configuration
    location / {
        proxy_pass http://cv_analyzer;
        proxy_http_version 1.1;
        
        # Headers for proxying
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # Cache static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }
    
    location ~ ~$ {
        deny all;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://cv_analyzer;
    }
}
