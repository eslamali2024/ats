#!/bin/bash

# CV Analyzer Service - Log Rotation Configuration
# Copy this file to /etc/logrotate.d/cv-analyzer

/home/username/public_html/cv-analyzer-service/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 username username
    sharedscripts
    postrotate
        /bin/systemctl reload cv-analyzer > /dev/null 2>&1 || true
    endscript
}
